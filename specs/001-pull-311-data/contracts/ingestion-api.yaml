openapi: 3.1.0
info:
  title: UC-01 Ingestion Observability Contract
  version: 0.1.0
  description: >
    Minimal backend contract required to observe and test the UC-01 scheduled
    Edmonton 311 ingestion workflow. This contract is intended for scheduler
    test harnesses, backend observability, and acceptance verification.
servers:
  - url: https://example.invalid
paths:
  /api/v1/ingestion-runs/311/trigger:
    post:
      summary: Trigger the UC-01 ingestion flow through the scheduler-equivalent path
      description: >
        Available for test and controlled operational contexts. It must execute
        the same orchestration path used by the scheduled trigger.
      operationId: triggerEdmonton311Ingestion
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                triggerType:
                  type: string
                  enum: [test_trigger]
      responses:
        '202':
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionRunAccepted'
        '401':
          description: Missing or invalid token
        '403':
          description: Caller lacks the OperationalManager role
  /api/v1/ingestion-runs/{runId}:
    get:
      summary: Retrieve the status and outcome of an ingestion run
      operationId: getIngestionRun
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Run found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionRunStatus'
        '401':
          description: Missing or invalid token
        '403':
          description: Caller lacks a read role
        '404':
          description: Run not found
  /api/v1/datasets/current:
    get:
      summary: Retrieve the currently active dataset version for the Edmonton 311 source
      operationId: getCurrentDataset
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current dataset marker found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentDataset'
        '401':
          description: Missing or invalid token
        '403':
          description: Caller lacks a read role
  /api/v1/monitoring/failure-notifications:
    get:
      summary: List failure notifications for failed ingestion runs
      operationId: listFailureNotifications
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: run_id
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Failure notification records
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FailureNotification'
        '401':
          description: Missing or invalid token
        '403':
          description: Caller lacks a read role
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    IngestionRunAccepted:
      type: object
      required: [run_id, status]
      properties:
        run_id:
          type: string
        status:
          type: string
          enum: [running]
    IngestionRunStatus:
      type: object
      required:
        - run_id
        - status
        - result_type
        - started_at
        - cursor_advanced
      properties:
        run_id:
          type: string
        status:
          type: string
          enum: [running, success, failed]
        result_type:
          type: string
          enum:
            - new_data
            - no_new_records
            - auth_failure
            - source_unavailable
            - validation_failure
            - storage_failure
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        cursor_used:
          type: string
        cursor_advanced:
          type: boolean
        candidate_dataset_id:
          type: string
        dataset_version_id:
          type: string
        records_received:
          type: integer
          minimum: 0
        failure_reason:
          type: string
    CurrentDataset:
      type: object
      required:
        - source_name
        - dataset_version_id
        - updated_at
        - updated_by_run_id
        - record_count
      properties:
        source_name:
          type: string
          enum: [edmonton_311]
        dataset_version_id:
          type: string
        updated_at:
          type: string
          format: date-time
        updated_by_run_id:
          type: string
        record_count:
          type: integer
          minimum: 0
    FailureNotification:
      type: object
      required:
        - notification_id
        - run_id
        - failure_category
        - run_status
        - recorded_at
        - message
      properties:
        notification_id:
          type: string
        run_id:
          type: string
        failure_category:
          type: string
          enum:
            - auth_failure
            - source_unavailable
            - validation_failure
            - storage_failure
        run_status:
          type: string
          enum: [failed]
        recorded_at:
          type: string
          format: date-time
        message:
          type: string
