openapi: 3.1.0
info:
  title: Forecast Alert API
  version: 0.2.0
  description: >
    API for managing forecast alert thresholds and reviewing triggered events.
    Aligned with the simplified category-level threshold implementation.
servers:
  - url: /api/v1/forecast-alerts
paths:
  /thresholds:
    get:
      summary: List all threshold configurations
      responses:
        '200':
          description: List of configurations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThresholdConfigurationListResponse'
    post:
      summary: Create a new threshold configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThresholdConfigurationWrite'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThresholdConfigurationRead'
  /thresholds/{id}:
    patch:
      summary: Update an existing threshold
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThresholdConfigurationUpdate'
      responses:
        '200':
          description: Updated
    delete:
      summary: Deactivate a threshold
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deactivated
  /events:
    get:
      summary: List alert events
      responses:
        '200':
          description: List of events
  /service-categories:
    get:
      summary: List available service categories for thresholds
      responses:
        '200':
          description: List of categories

components:
  schemas:
    ThresholdConfigurationWrite:
      type: object
      required:
        - serviceCategory
        - forecastWindowType
        - thresholdValue
      properties:
        serviceCategory:
          type: string
        forecastWindowType:
          type: string
          enum: [hourly, daily]
        thresholdValue:
          type: number
        notificationChannels:
          type: array
          items:
            type: string
          default: [dashboard]

    ThresholdConfigurationRead:
      allOf:
        - $ref: '#/components/schemas/ThresholdConfigurationWrite'
        - type: object
          properties:
            thresholdConfigurationId:
              type: string
            status:
              type: string
            effectiveFrom:
              type: string
              format: date-time

    ThresholdConfigurationListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ThresholdConfigurationRead'
