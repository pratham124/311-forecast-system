openapi: 3.1.0
info:
  title: Alert Configuration API
  version: 0.1.0
  description: >
    Typed operational contracts for UC-13 shared alert-configuration retrieval
    and replacement, including validation rejection and storage-failure outcomes.
servers:
  - url: https://example.invalid
paths:
  /api/v1/alert-configurations/active:
    get:
      summary: Retrieve the single active alert configuration
      operationId: getActiveAlertConfiguration
      tags:
        - AlertConfiguration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active configuration returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveAlertConfigurationResponse'
        '401':
          description: Authentication required
        '403':
          description: Caller is not allowed to view alert configuration
    put:
      summary: Validate and replace the single active alert configuration
      operationId: replaceActiveAlertConfiguration
      tags:
        - AlertConfiguration
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertConfigurationSaveRequest'
      responses:
        '200':
          description: Configuration stored successfully and activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertConfigurationSaveSuccessResponse'
        '401':
          description: Authentication required
        '403':
          description: Caller is not allowed to update alert configuration
        '422':
          description: Submitted configuration failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertConfigurationValidationErrorResponse'
        '503':
          description: Configuration could not be stored; previous configuration remains active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertConfigurationStorageFailureResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SaveOutcome:
      type: string
      enum:
        - validation_rejected
        - stored_successfully
        - storage_failed
    ScopeType:
      type: string
      enum:
        - category_only
        - category_geography
    SupportedChannelType:
      type: string
      enum:
        - email
        - slack
        - teams
    DeduplicationKeyMode:
      type: string
      enum:
        - category_only
        - category_and_geography
    ActiveAlertConfigurationResponse:
      type: object
      additionalProperties: false
      required:
        - alertConfigurationVersionId
        - versionNumber
        - activatedAt
        - thresholdRules
        - selectedChannels
        - deliveryPreferences
        - supportedChannels
      properties:
        alertConfigurationVersionId:
          type: string
          format: uuid
        versionNumber:
          type: integer
          minimum: 1
        activatedAt:
          type: string
          format: date-time
        versionNote:
          type: string
          nullable: true
        thresholdRules:
          type: array
          items:
            $ref: '#/components/schemas/ThresholdRule'
        selectedChannels:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SupportedChannelType'
        deliveryPreferences:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryPreference'
        supportedChannels:
          type: array
          items:
            $ref: '#/components/schemas/SupportedChannel'
    AlertConfigurationSaveRequest:
      type: object
      additionalProperties: false
      required:
        - thresholdRules
        - selectedChannels
        - deliveryPreferences
      properties:
        versionNote:
          type: string
          maxLength: 500
        thresholdRules:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ThresholdRuleInput'
        selectedChannels:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/SupportedChannelType'
        deliveryPreferences:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryPreferenceInput'
    AlertConfigurationSaveSuccessResponse:
      type: object
      additionalProperties: false
      required:
        - saveOutcome
        - alertConfigurationUpdateAttemptId
        - activeConfiguration
      properties:
        saveOutcome:
          type: string
          const: stored_successfully
        alertConfigurationUpdateAttemptId:
          type: string
          format: uuid
        activeConfiguration:
          $ref: '#/components/schemas/ActiveAlertConfigurationResponse'
    AlertConfigurationValidationErrorResponse:
      type: object
      additionalProperties: false
      required:
        - saveOutcome
        - alertConfigurationUpdateAttemptId
        - previousActiveConfigurationVersionId
        - validationErrors
      properties:
        saveOutcome:
          type: string
          const: validation_rejected
        alertConfigurationUpdateAttemptId:
          type: string
          format: uuid
        previousActiveConfigurationVersionId:
          type: string
          format: uuid
        validationErrors:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ValidationError'
    AlertConfigurationStorageFailureResponse:
      type: object
      additionalProperties: false
      required:
        - saveOutcome
        - alertConfigurationUpdateAttemptId
        - previousActiveConfigurationVersionId
        - message
      properties:
        saveOutcome:
          type: string
          const: storage_failed
        alertConfigurationUpdateAttemptId:
          type: string
          format: uuid
        previousActiveConfigurationVersionId:
          type: string
          format: uuid
        message:
          type: string
    ThresholdRule:
      type: object
      additionalProperties: false
      required:
        - ruleId
        - serviceCategory
        - scopeType
        - thresholdValue
        - validationPolicyName
      properties:
        ruleId:
          type: string
          format: uuid
        serviceCategory:
          type: string
        scopeType:
          $ref: '#/components/schemas/ScopeType'
        geographyType:
          type: string
          nullable: true
        geographyValue:
          type: string
          nullable: true
        thresholdValue:
          type: number
        validationPolicyName:
          type: string
    ThresholdRuleInput:
      type: object
      additionalProperties: false
      required:
        - serviceCategory
        - scopeType
        - thresholdValue
      properties:
        serviceCategory:
          type: string
        scopeType:
          $ref: '#/components/schemas/ScopeType'
        geographyType:
          type: string
          nullable: true
        geographyValue:
          type: string
          nullable: true
        thresholdValue:
          type: number
      allOf:
        - if:
            properties:
              scopeType:
                const: category_only
          then:
            properties:
              geographyType:
                type: 'null'
              geographyValue:
                type: 'null'
        - if:
            properties:
              scopeType:
                const: category_geography
          then:
            required:
              - geographyType
              - geographyValue
    DeliveryPreference:
      type: object
      additionalProperties: false
      required:
        - preferenceId
        - serviceCategory
        - scopeType
      properties:
        preferenceId:
          type: string
          format: uuid
        serviceCategory:
          type: string
        scopeType:
          $ref: '#/components/schemas/ScopeType'
        geographyType:
          type: string
          nullable: true
        geographyValue:
          type: string
          nullable: true
        frequencyLimitCount:
          type: integer
          minimum: 1
          nullable: true
        frequencyLimitWindowMinutes:
          type: integer
          minimum: 1
          nullable: true
        deduplicationWindowMinutes:
          type: integer
          minimum: 1
          nullable: true
        deduplicationKeyMode:
          $ref: '#/components/schemas/DeduplicationKeyMode'
          nullable: true
    DeliveryPreferenceInput:
      type: object
      additionalProperties: false
      required:
        - serviceCategory
        - scopeType
      properties:
        serviceCategory:
          type: string
        scopeType:
          $ref: '#/components/schemas/ScopeType'
        geographyType:
          type: string
          nullable: true
        geographyValue:
          type: string
          nullable: true
        frequencyLimitCount:
          type: integer
          minimum: 1
          nullable: true
        frequencyLimitWindowMinutes:
          type: integer
          minimum: 1
          nullable: true
        deduplicationWindowMinutes:
          type: integer
          minimum: 1
          nullable: true
        deduplicationKeyMode:
          $ref: '#/components/schemas/DeduplicationKeyMode'
          nullable: true
      allOf:
        - if:
            properties:
              scopeType:
                const: category_only
          then:
            properties:
              geographyType:
                type: 'null'
              geographyValue:
                type: 'null'
        - if:
            properties:
              scopeType:
                const: category_geography
          then:
            required:
              - geographyType
              - geographyValue
        - if:
            required:
              - frequencyLimitCount
          then:
            required:
              - frequencyLimitWindowMinutes
        - if:
            required:
              - frequencyLimitWindowMinutes
          then:
            required:
              - frequencyLimitCount
        - if:
            required:
              - deduplicationWindowMinutes
          then:
            required:
              - deduplicationKeyMode
    SupportedChannel:
      type: object
      additionalProperties: false
      required:
        - channelType
        - displayName
        - isAvailable
      properties:
        channelType:
          $ref: '#/components/schemas/SupportedChannelType'
        displayName:
          type: string
        isAvailable:
          type: boolean
    ValidationError:
      type: object
      additionalProperties: false
      required:
        - field
        - code
        - message
      properties:
        field:
          type: string
        code:
          type: string
        message:
          type: string
