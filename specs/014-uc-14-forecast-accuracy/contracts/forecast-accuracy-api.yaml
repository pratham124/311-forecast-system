openapi: 3.1.0
info:
  title: Forecast Accuracy API
  version: 0.1.0
  description: >
    Typed contracts for UC-14 forecast-performance retrieval, including
    rendered-with-metrics, rendered-without-metrics, unavailable, and
    render-failure observability flows.
servers:
  - url: https://example.invalid
paths:
  /api/v1/forecast-accuracy:
    get:
      summary: Retrieve a normalized forecast-accuracy view for the default or selected scope
      operationId: getForecastAccuracyView
      tags:
        - ForecastAccuracy
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: timeRangeStart
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: timeRangeEnd
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: serviceCategory
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Forecast-accuracy view returned successfully, with or without metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastAccuracyResponse'
              examples:
                renderedWithMetrics:
                  value:
                    forecastAccuracyRequestId: "fa-request-1"
                    forecastAccuracyResultId: "fa-result-1"
                    correlationId: "fa-request-1"
                    timeRangeStart: "2026-03-01T00:00:00Z"
                    timeRangeEnd: "2026-03-02T00:00:00Z"
                    serviceCategory: "Roads"
                    forecastProductName: "daily_1_day"
                    comparisonGranularity: "hourly"
                    viewStatus: "rendered_with_metrics"
                    metricResolutionStatus: "computed_on_demand"
                    metrics:
                      mae: 1.0
                      rmse: 1.0
                      mape: 33.3333
                    alignedBuckets:
                      - bucketStart: "2026-03-01T00:00:00Z"
                        bucketEnd: "2026-03-01T01:00:00Z"
                        serviceCategory: "Roads"
                        forecastValue: 4
                        actualValue: 3
                        absoluteErrorValue: 1
                        percentageErrorValue: 33.3333
                renderedWithoutMetrics:
                  value:
                    forecastAccuracyRequestId: "fa-request-2"
                    forecastAccuracyResultId: "fa-result-2"
                    correlationId: "fa-request-2"
                    timeRangeStart: "2026-03-01T00:00:00Z"
                    timeRangeEnd: "2026-03-01T01:00:00Z"
                    serviceCategory: "Roads"
                    forecastProductName: "daily_1_day"
                    comparisonGranularity: "hourly"
                    viewStatus: "rendered_without_metrics"
                    metricResolutionStatus: "unavailable"
                    statusMessage: "Metrics are unavailable because at least two aligned buckets are required for on-demand computation"
                    alignedBuckets:
                      - bucketStart: "2026-03-01T00:00:00Z"
                        bucketEnd: "2026-03-01T01:00:00Z"
                        serviceCategory: "Roads"
                        forecastValue: 4
                        actualValue: 1
                        absoluteErrorValue: 3
                        percentageErrorValue: 300
                unavailable:
                  value:
                    forecastAccuracyRequestId: "fa-request-3"
                    forecastAccuracyResultId: "fa-result-3"
                    correlationId: "fa-request-3"
                    timeRangeStart: "2026-03-01T00:00:00Z"
                    timeRangeEnd: "2026-03-02T00:00:00Z"
                    forecastProductName: "daily_1_day"
                    comparisonGranularity: "hourly"
                    viewStatus: "unavailable"
                    statusMessage: "Historical forecast data is unavailable for the selected scope."
                    alignedBuckets: []
                error:
                  value:
                    forecastAccuracyRequestId: "fa-request-4"
                    forecastAccuracyResultId: "fa-result-4"
                    correlationId: "fa-request-4"
                    timeRangeStart: "2026-03-01T00:00:00Z"
                    timeRangeEnd: "2026-03-02T00:00:00Z"
                    forecastProductName: "daily_1_day"
                    comparisonGranularity: "hourly"
                    viewStatus: "error"
                    statusMessage: "No overlapping forecast and actual buckets are available for safe comparison"
                    alignedBuckets: []
        '401':
          description: Authentication required
        '403':
          description: Caller is not allowed to view forecast accuracy
        '422':
          description: Invalid scope parameters
  /api/v1/forecast-accuracy/{forecastAccuracyRequestId}/render-events:
    post:
      summary: Record the final client render outcome for a forecast-accuracy request
      operationId: recordForecastAccuracyRenderEvent
      tags:
        - ForecastAccuracy
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: forecastAccuracyRequestId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForecastAccuracyRenderEventRequest'
      responses:
        '202':
          description: Render outcome accepted
          content:
            application/json:
              examples:
                rendered:
                  value:
                    forecastAccuracyRequestId: "fa-request-1"
                    recordedOutcomeStatus: "rendered"
                    message: "Render success recorded."
                renderFailed:
                  value:
                    forecastAccuracyRequestId: "fa-request-1"
                    recordedOutcomeStatus: "render_failed"
                    message: "Render failure recorded."
        '401':
          description: Authentication required
        '403':
          description: Caller is not allowed to report render outcomes for the referenced request
        '404':
          description: Forecast-accuracy request not found
        '422':
          description: Invalid render event
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ViewStatus:
      type: string
      enum:
        - rendered_with_metrics
        - rendered_without_metrics
        - unavailable
        - error
    MetricResolutionStatus:
      type: string
      enum:
        - retrieved_precomputed
        - computed_on_demand
        - unavailable
        - failed
    ForecastProductName:
      type: string
      enum:
        - daily_1_day
    ComparisonGranularity:
      type: string
      enum:
        - hourly
        - daily
    ForecastAccuracyResponse:
      type: object
      additionalProperties: false
      required:
        - forecastAccuracyRequestId
        - forecastAccuracyResultId
        - timeRangeStart
        - timeRangeEnd
        - comparisonGranularity
        - viewStatus
        - alignedBuckets
      properties:
        forecastAccuracyRequestId:
          type: string
          format: uuid
        forecastAccuracyResultId:
          type: string
          format: uuid
        correlationId:
          type: string
          nullable: true
        timeRangeStart:
          type: string
          format: date-time
        timeRangeEnd:
          type: string
          format: date-time
        serviceCategory:
          type: string
          nullable: true
        forecastProductName:
          $ref: '#/components/schemas/ForecastProductName'
        comparisonGranularity:
          $ref: '#/components/schemas/ComparisonGranularity'
        viewStatus:
          $ref: '#/components/schemas/ViewStatus'
        metricResolutionStatus:
          $ref: '#/components/schemas/MetricResolutionStatus'
        statusMessage:
          type: string
          nullable: true
        metrics:
          $ref: '#/components/schemas/ForecastAccuracyMetrics'
        alignedBuckets:
          type: array
          items:
            $ref: '#/components/schemas/ForecastAccuracyAlignedBucket'
      allOf:
        - if:
            properties:
              viewStatus:
                const: rendered_with_metrics
          then:
            required:
              - metricResolutionStatus
              - metrics
        - if:
            properties:
              viewStatus:
                const: rendered_without_metrics
          then:
            required:
              - metricResolutionStatus
              - statusMessage
        - if:
            properties:
              viewStatus:
                const: unavailable
          then:
            required:
              - statusMessage
            properties:
              alignedBuckets:
                maxItems: 0
        - if:
            properties:
              viewStatus:
                const: error
          then:
            required:
              - statusMessage
            properties:
              alignedBuckets:
                maxItems: 0
    ForecastAccuracyMetrics:
      type: object
      additionalProperties: false
      required:
        - mae
        - rmse
        - mape
      properties:
        mae:
          type: number
        rmse:
          type: number
        mape:
          type: number
    ForecastAccuracyAlignedBucket:
      type: object
      additionalProperties: false
      required:
        - bucketStart
        - bucketEnd
        - forecastValue
        - actualValue
        - absoluteErrorValue
      properties:
        bucketStart:
          type: string
          format: date-time
        bucketEnd:
          type: string
          format: date-time
        serviceCategory:
          type: string
          nullable: true
        forecastValue:
          type: number
        actualValue:
          type: number
        absoluteErrorValue:
          type: number
        percentageErrorValue:
          type: number
          nullable: true
    RenderOutcome:
      type: string
      enum:
        - rendered
        - failed
    ForecastAccuracyRenderEventRequest:
      type: object
      additionalProperties: false
      required:
        - forecastAccuracyResultId
        - renderOutcome
      properties:
        forecastAccuracyResultId:
          type: string
          format: uuid
        renderOutcome:
          $ref: '#/components/schemas/RenderOutcome'
        failureReason:
          type: string
          nullable: true
      allOf:
        - if:
            properties:
              renderOutcome:
                const: failed
          then:
            required:
              - failureReason
